<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Experiment Management
    </title>

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <h1>
            🚀 Experiment Management
        </h1>

        <div class="header-buttons">

            <!-- CREATE -->

            <a href="/admin/experiments/create"
               class="create-btn">

                + Create Experiment

            </a>

        </div>

    </div>

    <!-- TABLE -->

    <table>

        <thead>

        <tr>

            <th>Flag Key</th>

            <th>Description</th>

            <th>Status</th>

            <th>Rollout %</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="exp : ${experiments}">

            <!-- FLAG -->

            <td th:text="${exp.flagKey}">
            </td>

            <!-- DESCRIPTION -->

            <td th:text="${exp.description}">
            </td>

            <!-- STATUS -->

            <td>

                <span class="status"
                      th:text="${exp.status}">
                </span>

            </td>

            <!-- ROLLOUT -->

            <td th:text="${exp.rolloutPercentage} + '%'">
            </td>

            <!-- ACTIONS -->

            <td class="actions">

                <!-- DASHBOARD -->

                <a th:href="@{/dashboard/{key}(key=${exp.flagKey})}"
                   class="dashboard-btn-table">

                  📊Dashboard

                </a>

                <!-- PAUSE -->

                <form th:if="${exp.status.name() == 'ON'}"
                      th:action="@{/admin/experiments/pause/{key}(key=${exp.flagKey})}"
                      method="post">

                    <button class="pause-btn"
                            type="submit">

                        Pause

                    </button>

                </form>

                <!-- RESUME -->

                <form th:if="${exp.status.name() == 'OFF'}"
                      th:action="@{/admin/experiments/resume/{key}(key=${exp.flagKey})}"
                      method="post">

                    <button class="resume-btn"
                            type="submit">

                        Resume

                    </button>

                </form>

                <!-- AUTO ROLLOUT -->

                <form th:action="@{/admin/experiments/rollout/{key}(key=${exp.flagKey})}"
                      method="post">

                    <button class="rollout-btn"
                            type="submit">

                        Auto Rollout

                    </button>

                </form>

                <!-- DELETE -->

                <form th:action="@{/admin/experiments/delete/{key}(key=${exp.flagKey})}"
                      method="post"
                      onsubmit="return confirmDelete()">

                    <button class="delete-btn"
                            type="submit">

                        Delete

                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<!-- DELETE CONFIRMATION -->

<script>

function confirmDelete() {

    return confirm(
        "Are you sure you want to delete this experiment?"
    );
}

</script>

</body>

</html>
