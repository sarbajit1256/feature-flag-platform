<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Experiment</title>

    <style>

        body {
            background: #02133b;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        .card {
            background: #223457;
            padding: 40px;
            border-radius: 20px;
            width: 600px;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 25px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>Create Experiment</h1>

    <form action="/admin/experiments/create"
          method="post">

        <label>Flag Key</label>

        <input type="text"
               name="flagKey"
               required>

        <label>Description</label>

        <input type="text"
               name="description">

        <label>Rollout %</label>

        <input type="number"
               name="rolloutPercentage"
               value="10">

        <label>Status</label>

        <select name="status">

            <option value="ON">ON</option>
            <option value="OFF">OFF</option>

        </select>

        <button type="submit">
            Create Experiment
        </button>

    </form>

</div>

</body>

</html>
